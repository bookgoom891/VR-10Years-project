<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Web App</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <div class="topbar">
          <div>
            <p class="eyebrow">Personal Web App</p>
            <h1>오늘의 작업 공간</h1>
          </div>
          <button id="addTaskButton" type="button">추가</button>
        </div>

        <form class="composer" id="taskForm">
          <input
            id="taskInput"
            name="task"
            type="text"
            autocomplete="off"
            placeholder="할 일을 입력하세요"
            aria-label="할 일"
          />
        </form>

        <ul class="task-list" id="taskList" aria-live="polite"></ul>
      </section>
    </main>

    <template id="taskTemplate">
      <li class="task-item">
        <label>
          <input type="checkbox" />
          <span></span>
        </label>
        <button type="button" aria-label="삭제">×</button>
      </li>
    </template>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
